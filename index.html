<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bool Tok</title>
  <link rel="icon" href="assets/img/booltok_logo.png">


  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">


  <!-- TikTok Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=TikTok+Sans:opsz,wght@12..36,300..900&display=swap"
    rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css">

</head>

<body>
  <!-- Container della pagina, necessario per via del layout particolare -->
  <div class="reel-page debug">
    <video src="assets/video/coder.mp4" autoplay muted loop></video>

    <!-- Header -->
    <header class="reel-header text-white">
      <!-- <div class="reel-header-container"> -->
      <div class="reel-header-item">
        <i class="bi bi-play-btn"></i>
      </div>
      <div class="reel-header-item">
        <a class="esplora" href="#">Esplora</a>
        <a class="seguiti" href="#">Seguiti</a>
        <a class="per-te" href="#">Per te</a>
      </div>
      <div class="reel-header-item">
        <i class="bi bi-search"></i>
      </div>
      <!-- </div> -->

    </header>

    <!-- Sidebar -->
    <div class="sidebar text-white">
      <img class="sidebar-img" src="./assets/img/boolean_logo.png" alt="icona profilo TikTok">
      <div class="sidebar-item">
        <span class="sidebar-item-icon">
          <i class="bi bi-heart-fill"></i>
        </span>
        <span class="sidebar-item-content">
          <p class="sidebar-item-content">588</p>
        </span>
      </div>
      <div class="sidebar-item">
        <span class="sidebar-item-icon">
          <i class="bi bi-chat-dots-fill"></i>
        </span>
        <span class="sidebar-item-content">
          <p class="sidebar-item-content">13</p>
        </span>
      </div>
      <div class="sidebar-item">
        <span class="sidebar-item-icon">
          <i class="bi bi-bookmark-fill"></i>
        </span>
        <span class="sidebar-item-content">
          <p class="sidebar-item-content">638</p>
        </span>
      </div>
      <div class="sidebar-item">
        <span class="sidebar-item-icon">
          <i class="bi bi-send-fill"></i>
        </span>
        <span class="sidebar-item-content">
          <p class="sidebar-item-content">491</p>
        </span>
      </div>
    </div>

    <!-- Footer -->
    <footer class="reel-footer text-white text-small">
      <div class="footer-description">
        <p class="footer-profile"><strong>boolean.careers</strong></p>
        <p class="footer-content">Prova il Fundamentals Camp. 20 ore di corso <br>
          gratuito per... <strong>Vedi altro</strong>
        </p>
      </div>
      <div class="footer-menu">
        <div class="footer-menu-item">
          <i class="bi bi-house-fill"></i>
        </div>
        <div class="footer-menu-item">
          <i class="bi bi-people"></i>
        </div>
        <div class="footer-menu-item">
          <i class="bi bi-plus-square-fill"></i>
        </div>
        <div class="footer-menu-item">
          <i class="bi bi-chat-square"></i>
        </div>
        <div class="footer-menu-item">
          <i class="bi bi-person"></i>
        </div>
      </div>
    </footer>
  </div>

</body>

</html>
